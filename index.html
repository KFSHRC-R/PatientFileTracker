<!DOCTYPE html>
<html>
<head>
  <title>Patient Tracker</title>
  <style>
    body { font-family: Arial; background:#f5f7fa; }
    .container { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; }
    input, select, button { width:100%; padding:10px; margin:10px 0; }
    button { background:#1e7e34; color:white; border:none; }
  </style>
</head>

<body>

<div class="container">
  <h3 id="roomDisplay"></h3>

  <input id="mrn" placeholder="Enter MRN">

  <select id="transaction">
    <option>Admission</option>
    <option>Discharge</option>
    <option>Transfer IN</option>
    <option>Transfer OUT</option>
  </select>

  <select id="paper">
    <option>Yes</option>
    <option>No</option>
  </select>

  <input id="staff" placeholder="Enter Staff ID">

  <button onclick="submitData()">Submit</button>
</div>

<script>
const scriptURL = "PASTE_YOUR_SCRIPT_URL_HERE";

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
document.getElementById("roomDisplay").innerText = "Room: " + room;

function submitData() {

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      room: room,
      mrn: document.getElementById("mrn").value,
      transaction: document.getElementById("transaction").value,
      paper: document.getElementById("paper").value,
      staff: document.getElementById("staff").value
    })
  })
  .then(() => {
    alert("Saved successfully ✅");
  })
  .catch(() => {
    alert("Error saving data ❌");
  });
}
</script>

</body>
</html>
