<!DOCTYPE html>
<html>
<head>
  <title>Patient Tracker</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f7fa;}
    .header { background:#1e7e34; padding:10px; text-align:center; color:white;}
    .container { max-width:500px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
    label { font-weight:bold; display:block; margin-top:10px; }
    input, select, button { width:100%; padding:12px; margin:6px 0 12px 0; font-size:16px; }
    button { background:#1e7e34; color:white; border:none; }
  </style>
</head>

<body>

<div class="header">
  <h2>Patient File Tracking</h2>
</div>

<div class="container">
  <h3 id="roomDisplay"></h3>

  <form method="POST"
    action="https://docs.google.com/forms/d/e/1FAIpQLSfqqmEJVwvBR23wByk3ZombavXdxKwQClvFzhxp8-3zMIRSwQ/formResponse">

    <label>MRN</label>
    <input type="text" name="entry.1501114177" required>

    <label>Transaction</label>
    <select name="entry.1813527718">
      <option>Admission</option>
      <option>Discharge</option>
      <option>Transfer IN</option>
      <option>Transfer OUT</option>
    </select>

    <label>Paper Portion</label>
    <select name="entry.1687801292">
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Staff ID</label>
    <input type="text" name="entry.1971858546" required>

    <input type="hidden" id="roomField" name="entry.1633806583">

    <button type="submit">Submit</button>
  </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

document.getElementById("roomDisplay").innerText = "Room: " + room;
document.getElementById("roomField").value = room;
</script>

</body>
</html>
