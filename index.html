<!DOCTYPE html>
<html>
<head>
  <title>Patient Tracker</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f7fa;}
    .header { background:#1e7e34; padding:10px; text-align:center; }
    .header img { max-width:260px; }
    .container { max-width:500px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
    label { font-weight:bold; display:block; margin-top:10px; }
    input, select, button { width:100%; padding:12px; margin:6px 0 12px 0; }
    button { background:#1e7e34; color:white; border:none; font-size:16px; }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<div class="container">
  <h3 id="roomDisplay"></h3>

  <form id="form">

    <label>MRN</label>
    <input type="text" id="mrn" required>

    <label>Transaction</label>
    <select id="transaction">
      <option>Admission</option>
      <option>Discharge</option>
      <option>Transfer IN</option>
      <option>Transfer OUT</option>
    </select>

    <label>Paper Portion</label>
    <select id="paper">
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Staff ID</label>
    <input type="text" id="staff" required>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const room = params.get("room");
document.getElementById("roomDisplay").innerText = "Room: " + room;

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
    method: "POST",
    body: JSON.stringify({
      room: room,
      mrn: document.getElementById("mrn").value,
      transaction: document.getElementById("transaction").value,
      paper: document.getElementById("paper").value,
      staff: document.getElementById("staff").value
    })
  })
  .then(() => {
    alert("Saved successfully!");
    window.location.href = "about:blank";
  });
});
</script>

</body>
</html>
